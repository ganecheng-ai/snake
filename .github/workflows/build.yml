name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ['3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame pyinstaller

    - name: Create distribution directory
      run: |
        mkdir -p dist_release
      shell: bash

    - name: Build executable with PyInstaller
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          pyinstaller --onefile --windowed --name "SnakeGame" \
            --add-data "game/snake_game.py;game" \
            game/snake_game.py
          cp dist/SnakeGame.exe dist_release/SnakeGame-windows-x86_64.exe
          echo "OS=windows" >> $GITHUB_ENV
          echo "ARCH=x86_64" >> $GITHUB_ENV
        elif [ "$RUNNER_OS" == "Linux" ]; then
          pyinstaller --onefile --name "SnakeGame" \
            --add-data "game/snake_game.py:game" \
            game/snake_game.py
          cp dist/SnakeGame dist_release/SnakeGame-linux-x86_64
          echo "OS=linux" >> $GITHUB_ENV
          echo "ARCH=x86_64" >> $GITHUB_ENV
        elif [ "$RUNNER_OS" == "macOS" ]; then
          # macOS: Use onedir mode with .app bundle for GUI app
          # Create a minimal valid icns file using Python
          mkdir -p icons
          python3 << 'PYEOF'
import struct
# ICNS header: 'icns' + size (big endian)
# Minimal ICNS with one icon entry (ICON type, 16x16)
icns_data = b'icns' + struct.pack('>I', 1024)
# Add empty ICON entry
icns_data += b'ICON' + struct.pack('>I', 1008) + b'\x00' * 1008
with open('icons/empty.icns', 'wb') as f:
    f.write(icns_data)
PYEOF
          pyinstaller --onedir --windowed --name "SnakeGame" \
            --icon=icons/empty.icns \
            --add-data "game/snake_game.py:game" \
            game/snake_game.py
          # Copy .app bundle to dist_release
          cp -r dist/SnakeGame.app dist_release/
          echo "OS=macos" >> $GITHUB_ENV
          echo "ARCH=x86_64" >> $GITHUB_ENV
        fi
      shell: bash
      env:
        RUNNER_OS: ${{ runner.os }}

    - name: Create archive for Linux
      if: runner.os == 'Linux'
      working-directory: dist_release
      run: |
        tar -czvf SnakeGame-${{ env.OS }}-${{ env.ARCH }}.tar.gz SnakeGame-${{ env.OS }}-${{ env.ARCH }}

    - name: Create DMG for macOS
      if: runner.os == 'macOS'
      working-directory: dist_release
      run: |
        # Create a DMG file for the .app bundle
        hdiutil create -volname "SnakeGame" -srcfolder "SnakeGame.app" -ov -format UDZO SnakeGame-${{ env.OS }}-${{ env.ARCH }}.dmg

    - name: Create zip for Windows
      if: runner.os == 'Windows'
      working-directory: dist_release
      run: |
        Compress-Archive -Path SnakeGame-windows-x86_64.exe -DestinationPath SnakeGame-windows-x86_64.zip

    - name: Generate SHA256 checksums
      working-directory: dist_release
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          # Windows: Use PowerShell Get-FileHash for proper format
          Get-FileHash SnakeGame-windows-x86_64.zip -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  $($_.Path -replace '^.*/', '')" } > checksums.txt
        elif [ "$RUNNER_OS" == "Linux" ]; then
          sha256sum SnakeGame-${{ env.OS }}-${{ env.ARCH }}.tar.gz > checksums.txt
        elif [ "$RUNNER_OS" == "macOS" ]; then
          shasum -a 256 SnakeGame-${{ env.OS }}-${{ env.ARCH }}.dmg > checksums.txt
        fi
      shell: bash
      env:
        RUNNER_OS: ${{ runner.os }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: snake-game-${{ matrix.os }}
        path: dist_release/
        retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Combine all release files
      run: |
        mkdir -p release_files
        # Copy all artifacts to release_files directory
        for dir in artifacts/*/; do
          cp "$dir"/*.tar.gz release_files/ 2>/dev/null || true
          cp "$dir"/*.zip release_files/ 2>/dev/null || true
          cp "$dir"/*.dmg release_files/ 2>/dev/null || true
          cp "$dir"/*.txt release_files/ 2>/dev/null || true
        done

    - name: Generate combined checksums
      working-directory: release_files
      run: |
        sha256sum * > checksums.txt 2>/dev/null || true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: release_files/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
